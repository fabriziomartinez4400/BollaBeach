version: "3.9"

services:

  db:
    image: mysql:8.0
    container_name: wp_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: local
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - wp_network

  wordpress:
    image: wordpress:php8.2-apache
    container_name: wp_app
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST:     db
      WORDPRESS_DB_NAME:     local
      WORDPRESS_DB_USER:     root
      WORDPRESS_DB_PASSWORD: root
      WORDPRESS_CONFIG_EXTRA: |
        define('DB_HOST', 'db');
    volumes:
      - .:/var/www/html
    networks:
      - wp_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: wp_phpmyadmin
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8081:80"
    environment:
      PMA_HOST:          db
      PMA_PORT:          3306
      PMA_USER:          root
      PMA_PASSWORD:      root
      UPLOAD_LIMIT:      256M
      MEMORY_LIMIT:      512M
      MAX_EXECUTION_TIME: 3600
    volumes:
      - ./phpmyadmin-misc.ini:/usr/local/etc/php/conf.d/phpmyadmin-misc.ini
    networks:
      - wp_network

volumes:
  db_data:

networks:
  wp_network:
    driver: bridge